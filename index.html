<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 GitHub 主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            border: 1px solid #30363d;
            border-radius: 12px;
            background-color: #161b22;
        }
        h1 {
            color: #58a6ff;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #238636;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #2ea043;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello, GitHub! 🎉</h1>
        <p>
            我是 <span id="username">Kang</span>，<br>
            这是我在 GitHub 上的第一个项目！<br>
            正在学习代码、记录成长，欢迎来逛逛~
        </p>
        <a href="https://github.com/feifeifei985" class="btn">访问我的 GitHub</a>
    </div>
</body>
</html>
